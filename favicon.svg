<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#030a14"/>
  <!-- hull -->
  <path d="M2 22 L5 26 L27 26 L30 22 Z" fill="#f0a030"/>
  <!-- main deck -->
  <rect x="4" y="18" width="24" height="4" rx="1" fill="#f0a030"/>
  <!-- cargo containers row -->
  <rect x="5"  y="14" width="5" height="4" rx=".6" fill="#c07820"/>
  <rect x="11" y="14" width="5" height="4" rx=".6" fill="#c07820"/>
  <!-- bridge superstructure -->
  <rect x="19" y="11" width="7" height="7" rx="1" fill="#f0a030"/>
  <!-- bridge windows -->
  <rect x="20" y="12" width="2" height="1.5" rx=".3" fill="#030a14" opacity=".55"/>
  <rect x="23" y="12" width="2" height="1.5" rx=".3" fill="#030a14" opacity=".55"/>
  <!-- funnel -->
  <rect x="22" y="8" width="3" height="3" rx="1" fill="#f0a030"/>
  <!-- funnel top smoke cap -->
  <rect x="21.5" y="7" width="4" height="1.2" rx=".6" fill="#c07820"/>
  <!-- bow line -->
  <path d="M4 18 L2 22" stroke="#c07820" stroke-width="1" stroke-linecap="round"/>
  <!-- water waves -->
  <path d="M1 27.5 Q5 26.2 9 27.5 Q13 28.8 17 27.5 Q21 26.2 25 27.5 Q27.5 28.3 31 27.5" fill="none" stroke="#1a3a5c" stroke-width="1.2" stroke-linecap="round"/>
</svg>
